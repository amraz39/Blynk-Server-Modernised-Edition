# -----------------------------------------------------------------------
# Blynk Server - Mail Configuration
# Copy this file to your server data folder and fill in your credentials.
# -----------------------------------------------------------------------

# --- GMAIL (default) ---
# IMPORTANT: Google disabled "Less Secure Apps" in 2022.
# You MUST use a Gmail App Password, not your regular password.
# Generate one at: https://myaccount.google.com/apppasswords
# (Requires 2-Step Verification to be enabled on your Google account)

mail.smtp.auth=true
mail.smtp.starttls.enable=true
mail.smtp.starttls.required=true
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.username=YOUR_GMAIL_ADDRESS@gmail.com
mail.smtp.password=YOUR_16_CHAR_APP_PASSWORD

# Explicit TLS protocol versions - required on Java 21 with modern Gmail
mail.smtp.ssl.protocols=TLSv1.2 TLSv1.3

# Trust the Gmail SMTP certificate explicitly (avoids SSLHandshakeException)
mail.smtp.ssl.trust=smtp.gmail.com

# Timeouts (ms)
mail.smtp.connectiontimeout=10000
mail.smtp.timeout=30000
mail.smtp.writetimeout=30000


# --- ALTERNATIVE: Any SMTP provider (Mailgun, Brevo, etc.) ---
# Uncomment and fill in to switch providers.
# Most providers give you better deliverability than Gmail for server alerts.
